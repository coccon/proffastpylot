# input to run PRFpylot
# leave empty if the default value should be used

instrument_number: SN039

# SITE INFORMATION
site_name: Sodankyla

# abbreviation of the site name in map file:
# <site_abbrev><date>.map
site_abbrev: so

# give coordinates
# leave empty if coordinates should be taken from file
coords:
  lat:
  lon:
  alt:  # km over sea level

# full path to the coord file.
# This file contains the coorindates of the sites.
# default: ${root_path}\data\coords.csv
coord_file:


# default: data\ILSList.csv
ils_file:

# use own intraday file
# leave empty if it should be 
# generated automatically from the datalogger file
intraday_file: "/home/lena/Projects/data/intraday/ke_2021_10_13.inp"

# if times of the recorded data is not stored in UTC, insert the offset here
# default: 0.0
utc_offset: 


# process only dates in a specific time range
# date format: YYYY-MM-DD.
# Leave empty to process all dates in the data folder
start_date:
end_date:

# optional comment included in bin-files, string
# Leave empty adding no comment
note:


# ADDITIONAL OPTIONS

# path to the interferograms
# default: data/${site}/${instrument}/raw_data/
# this folder should contain a folder for 
# each date to be processed (YYMMDD)
data_path:

# path to prfpylot directory
# default: current directory
base_path:

# path to the map files
# default ${base_path}\data\${site}\map\
map_path:

# path of the p, T, h measurement files 
# produced by the datalogger at KIT
# default: data/<site>/log
datalogger_path:

# path to store the results,
# note that some results are stored 
# at the location of the data_path by PROFFAST
# default: data/${site}/${instrument}/${results}/${start}_${end}
result_path:
