# input to run PRFpylot
# enter "default" for values to be set automatcally

instrument_number: SN039

# SITE INFORMATION
site_name: Sodankyla
# abbreviation of the site name in map file:
# <site_abbrev><date>.map
site_abbrev: so

# give coordinates
# leave empty if coordinates should be taken from file
coords:
  lat:
  lon:
  alt:  # km over sea level


# you can insert the UTC time shift manually here.
# leave empty for calculationg the time shift from the gps coordinates (recommended)
utc_offset: 


# If you want to process only a ceratain date interval it is possible to give
# here the start_date and end_date of this intervall
# Otherwise all files which are found on the disk are going to be processed.
# The date must be given in ISO8601 format. I.e. YYYY-MM-DD.
# Leave empty to process all dates in the corresponding folder
start_date:
end_date:

# full path and name of the coord file. This file contains the coorindates
# of the sites.
# default: ${root_path}\data\coords.csv
coord_file: default


# OPTIONAL INFORMATION
# The following values can be set to default, or specified concretly

# path to profast directory (default: current directory)
base_path: default

# default ${root_path}\data\${site}\map\
map_path: default

# default ${root_path}\data\${site}\log\
pt_path: default

# datalog are the files of the datalogger at KIT. I.e. p, T, h measurements
datalogger_path: default

# logfiles are the logs of the calculations.
logfile_path: default

#default: data\ILSList.csv
ils_file: default

# optional comment included in bin-files, string
# Leave empty adding no comment
note:

# log file where the output of preprocess4 is stored in:
prep4_logpath: default

# TODO: path of the spectra:
#spectra_path: default

# TODO: path of the interfergorams:
#igram_path: default

# TODO: path of the results:
#result_path: default
