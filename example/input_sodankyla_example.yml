# input to run PRFpylot
# leave empty if the default value should be used

instrument_number: SN039

# SITE INFORMATION
site_name: Sodankyla

# abbreviation of the site name in map file:
# <site_abbrev><date>.map
site_abbrev: so

# give coordinates
# leave empty if coordinates should be taken from file
coords:
  lat:
  lon:
  alt:  # km over sea level

# full path to the coord file.
# This file contains the coorindates of the sites.
# default: ${root_path}\data\coords.csv
coord_file:


# if times of the recorded data is not stored in UTC, insert the offset here
# default: 0.0
utc_offset: 


# process only dates in a specific time range
# date format: YYYY-MM-DD.
# Leave empty to process all dates in the data folder
start_date:
end_date:

# optional comment included in bin-files, string
# Leave empty adding no comment
note:

# BEHAVIOUR:
delete_abscos.bin_files: True
delete_input_files: True

# PATH

proffast_path:

# input data
interferogram_path:
map_path:

pressure_path:
# the pressure type defines the format of the pressure file
# type original if you want to create the pt_intraday.inp file by yourself
# in the documentation about the pressure is described how to create your own filetype
# if type is original, naming of the files should be <site_abbrev>_<yy-mm-dd>.inp
pressure_type: log

# output data
analysis_path:
result_path:
