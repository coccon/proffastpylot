# input to run PRFpylot
# leave empty if the default value should be used

# SITE AND INSTRUMENT
#==============================

instrument_number: SN039

site_name: Sodankyla

# abbreviation of the site name as used in map file:
# <site_abbrev><date>.map
site_abbrev: so

# give coordinates
# leave empty if coordinates should be taken from file. An example file can
# be found in examples/input_data/coords.csv
coords:
  lat: 
  lon: 
  alt:   # km over sea level
# full path to the coord file.
# This file contains the coordinates of the sites.
# NOTE: The data retrieved of all dates in a single run are collected in
#       one single file. Hence, if the coordinates of the spectrometer changes
#       during the chosen time period, the it can happen that the local time
#       in the ouputfile is not correct anymore, since it is determined using
#       the coordinates of the first day in the run.
coord_file: e:\profast_pylot_dev\example\input_data\coords.csv

# if times of the recorded data is not stored in UTC, insert the offset here
# default: 0.0
utc_offset: 
#==============================


# BEHAVIOUR:
#==============================

# Start the processing chain with already available spectra. This can for 
# example be the case, if you have processed some data already but you want to
# reprocesse them with an other pressure value or an other map-file.
# The directory to the spectra is given as the 'analysis_path'.
# Please NOTE: In this case the folder this path points to must have a
# substructure like analysis/SiteName_InstrumentNumber/YYMMDD.
start_with_spectra: False


# process only dates in a specific time range
# date format: YYYY-MM-DD.
# Leave empty to process all dates in the data folder
start_date: 
end_date: 

# optional comment included in bin-files by PREPROCESS, string
# Leave empty adding no comment
note: 


# Do you want to delete the abscos.bin files after the execution?
# These file contain the simulation of the atmosphere which is the result or
# the 'pcxs' program. To keep the files can save computation time if you want 
# to calculate some spectra of the same location in the same datetime range
# again.
delete_abscos.bin_files: True
delete_input_files: False


# the pressure type defines the format of the pressure file
# type original if you want to create the pt_intraday.inp file by yourself
# in the documentation about the pressure is described how to create your own
# filetype if type is original, naming of the files should be
# <site_abbrev>_<yy-mm-dd>.inp
# The information where the corresponding files can be found is located in the
# PATH section.

# log refers to the 'MIRA-datalogger' format as used by KIT.
pressure_type: log
#==============================





# PATH
# ==============================

# proffast_path have to point to the folder containing the proffast files.
# The structure of this folder have to be kept like downloaded.
proffast_path: e:\profast_pylot_dev\prf

# input data
# -----------
# a folder where the data are located like YYMMDD/YYMMDDSN.XXX
interferogram_path: e:\profast_pylot_dev\example\input_data\interferograms_sodankyla\SN039
map_path: e:\profast_pylot_dev\example\input_data\map_sodankyla
pressure_path: e:\profast_pylot_dev\example\input_data\pressure_sodankyla



# output data
# -----------
# In the analysis path the spectra produced by preprocess are written to.
# The folder can be located anywhere on the disk. It is NOT mandatory to name
# the folder 'analysis'. In principle it can be named as you like. However,
# it is strongly recommended to use this name to keep the data structure
# compatibility to older proffast version as well as to profit.
# Within this folder the prfPylot will create a folder structure like
# analysis/SiteName_InstrumentNumber/YYMMDD.
# Please note: If you are using prfPylot to process already available spectra
# (*.bin files), you need to provide a folder structure as given above!
analysis_path: e:\profast_pylot_dev\example\analysis

# In the result path, the final results, the logfiles and if you want to keep
# them, the inputfiles are written to. Within the folder given here, prfPylot
# will create a folder named 'SiteName_InstrumentNumber_StartDate_EndDate'
result_path: e:\profast_pylot_dev\example\result_data\results_sodankyla
#==============================
