# This is the example pressure file for the MIRA Datalogger file

# the filename used to search for the pressure file looks like:
# filename = basename + "%Y-%m-%d" + "*.dat"
filename_parameters:
  basename: ""
  time_format: "%Y-%m-%d"
  ending: "*.dat"

# the pressure file itself has the structure:
# """
#   UTCdate_____  UTCtime___  BaroTHB40  VariousOtherColumns
#   01.01.2020    HH:MM:SS    1004.23    VariousOtherData
# """"
dataframe_parameters:
  pressure_key: "BaroTHB40"
  time_key: "UTCtime___"
  time_fmt: "%H:%M:%S"
  date_key: "UTCdate_____"
  date_fmt: "%Y-%m-%d"
  datetime_key: ""
  datetime_fmt: ""
  csv_kwargs:
    sep: "\t"

# Check the pressure data for the following parameters:
#  - Check if pressure is between min_pressure and max_pressure.
#    Else use default-value
#  - default_value can be either "skip", to skip the line or a number to use
#    instead
data_parameters:
  max_pressure: "1500"
  min_pressure: "500"
  default_value: "skip"

# If the pressure needs to be interpolated for a timestep larger than X hours,
# the spectrum is skipped. Give value in decimal hours
# (i.e. 30 min are equal to 0.5). The default value is 2 hours.
max_interpolation_time:

# UTC Offset of data:
# Have to be given even if data is processed in localtime!
utc_offset: 0.0

# pressure factor:
# The pressure column will be multiplied by this factor.
# Can be used e.g. for unit conversion or to correct for hight differences.
# The pressure column is assumed to be in hPa.
pressure_factor: 1.0

# pressure offset:
# The pressure offset is added to the read in pressure values.
# This can be used to correct for a constant offset.
pressure_offset: 0.0
