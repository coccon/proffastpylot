# input to run PRFpylot
# leave empty if the default value should be used

# SITE AND INSTRUMENT
#==============================

instrument_number: %instrument_number%

site_name: %site_name%

# abbreviation of the site name as used in map file:
# <site_abbrev><date>.map
site_abbrev: %site_abbrev%

# give coordinates
# leave empty if coordinates should be taken from file
coords:
  lat: %lat%
  lon: %lon%
  alt: %alt%  # km over sea level
# full path to the coord file.
# This file contains the coordinates of the sites.
# NOTE: The data retrieved of all dates in a single run are collected in
#       one single file. Hence, if the coordinates of the spectrometer changes
#       during the chosen time period, the it can happen that the local time
#       in the ouputfile is not correct anymore, since it is determined using
#       the coordinates of the first day in the run.
coord_file: %coord_file%

# if times of the recorded data is not stored in UTC, insert the offset here
# default: 0.0
utc_offset: %utc_offset%
#==============================


# BEHAVIOUR:
#==============================

# Start the processing chain with already available spectra. This can for 
# example be the case, if you have processed some data already but you want to
# reprocesse them with an other pressure value or an other map-file.
start_with_spectra: %start_with_spectra%


# process only dates in a specific time range
# date format: YYYY-MM-DD.
# Leave empty to process all dates in the data folder
start_date: %start_date%
end_date: %end_date%

# optional comment included in bin-files by PREPROCESS, string
# Leave empty adding no comment
note: %note%


# Do you want to delete the abscos.bin files after the execution?
# These file contain the simulation of the atmosphere which is the result or
# the 'pcxs' program. To keep the files can save computation time if you want 
# to calculate some spectra of the same location in the same datetime range
# again.
delete_abscos.bin_files: %delete_abscos.bin_files%
delete_input_files: %delete_input_files%


# the pressure type defines the format of the pressure file
# type original if you want to create the pt_intraday.inp file by yourself
# in the documentation about the pressure is described how to create your own
# filetype if type is original, naming of the files should be
# <site_abbrev>_<yy-mm-dd>.inp
# The information where the corresponding files can be found is located in the
# PATH section.

# log refers to the 'MIRA-datalogger' format as used by KIT.
pressure_type: log
#==============================





# PATH
#==============================

# The path to the profast folder as it is downloaded from git
proffast_path: %proffast_path%

# input data
# a folder where the data are located like YYMMDD/YYMMDDSN.XXX
interferogram_path: %interferogram_path%
map_path: %map_path%
pressure_path: %pressure_path%



# output data
analysis_path: %analysis_path%
result_path: %result_path%
#==============================
