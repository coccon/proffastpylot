# input to run PRFpylot
# leave empty if the default value should be used

instrument_number: %instrument_number%

# SITE INFORMATION
site_name: %site_name%

# abbreviation of the site name in map file:
# <site_abbrev><date>.map
site_abbrev: %site_abbrev%

# give coordinates
# leave empty if coordinates should be taken from file
coords:
  lat: %lat%
  lon: %lon%
  alt: %alt%  # km over sea level

# full path to the coord file.
# This file contains the coordinates of the sites.
# default: ${root_path}\data\coords.csv
coord_file: %coord_file%


# if times of the recorded data is not stored in UTC, insert the offset here
# default: 0.0
utc_offset: %utc_offset%


# process only dates in a specific time range
# date format: YYYY-MM-DD.
# Leave empty to process all dates in the data folder
start_date: %start_date%
end_date: %end_date%

# optional comment included in bin-files, string
# Leave empty adding no comment
note: %note%



# PATH
# The path to the profast folder as it is downloaded from git
profast_path: %profast_path%

# input data
# a folder where the data are located like YYMMDD/YYMMDDSN.XXX
interferogram_path: %interferogram_path%
map_path: %map_path%
pressure_path: %pressure_path%

# output data
analysis_path: %analysis_path%
result_path: %result_path%
